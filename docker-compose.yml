services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://admin:password@db:3306/actlink
      - JWT_SECRET=your_secret_key
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dwh_network

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=actlink
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - dwh_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - dwh_network

networks:
  dwh_network:
    external: false
