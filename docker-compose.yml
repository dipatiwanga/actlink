version: '3.8'

services:
  app:
    build: .
    container_name: actlink_app
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dwh_network

  db:
    image: mysql:latest
    container_name: actlink_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: actlink_db
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    networks:
      - dwh_network

networks:
  dwh_network:
    external: true
